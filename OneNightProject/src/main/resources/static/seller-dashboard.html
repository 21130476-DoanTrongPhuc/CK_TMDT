
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seller Dashboard</title>
<link rel="stylesheet" href="css/vendor.min.css">
<link rel="stylesheet" href="css/theme.min.css">
<style>
.sidebar{
min-height:100vh;
background:#fff;
border-right:1px solid #eee;
}
.stat-card{
border-radius:12px;
padding:20px;
background:#fff;
box-shadow:0 5px 20px rgba(0,0,0,.05);
}
</style>
</head>
<body style="background:#f6f9fc">

<div class="container-fluid">
<div class="row">

<div class="col-lg-2 sidebar p-4">
<h4 class="mb-4">Seller Panel</h4>

<ul class="nav flex-column">
<li class="nav-item mb-2"><a class="nav-link active" href="#">Dashboard</a></li>
<li class="nav-item mb-2"><a class="nav-link" href="#">Sản phẩm</a></li>
<li class="nav-item mb-2"><a class="nav-link" href="#">Đơn hàng</a></li>
<li class="nav-item mb-2"><a class="nav-link" href="#">Doanh thu</a></li>
<li class="nav-item mb-2"><a class="nav-link" href="#">Cài đặt</a></li>
</ul>
</div>

<div class="col-lg-10 p-4">

<h2 class="mb-4">Dashboard</h2>

<div class="row">
<div class="col-md-4 mb-4">
<div class="stat-card">
<h6>Tổng doanh thu</h6>
<h3>$12,540</h3>
</div>
</div>

<div class="col-md-4 mb-4">
<div class="stat-card">
<h6>Đơn hàng</h6>
<h3>254</h3>
</div>
</div>

<div class="col-md-4 mb-4">
<div class="stat-card">
<h6>Sản phẩm</h6>
<h3>85</h3>
</div>
</div>
</div>

<div class="card border-0 box-shadow">
<div class="card-header">
<h5 class="mb-0">Sản phẩm mới</h5>
</div>

<div class="card-body">
<table class="table">
<thead>
<tr>
<th>Sản phẩm</th>
<th>Giá</th>
<th>Tồn kho</th>
<th>Trạng thái</th>
</tr>
</thead>

<tbody>
<tr>
<td>Women Sneakers</td>
<td>$120</td>
<td>54</td>
<td><span class="badge badge-success">Active</span></td>
</tr>

<tr>
<td>Fashion Backpack</td>
<td>$80</td>
<td>20</td>
<td><span class="badge badge-warning">Pending</span></td>
</tr>

<tr>
<td>Custom Hat</td>
<td>$25</td>
<td>100</td>
<td><span class="badge badge-success">Active</span></td>
</tr>
</tbody>
</table>
</div>
</div>

</div>
</div>
</div>

    <script src="js/navbar.js"></script>
    <script src="js/cart.item.drop.down.js"></script>
</body>
</html>
